{% extends "base.html" %}

{% block title %}Edit expense — Spendly{% endblock %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/add-expense.css') }}">
{% endblock %}

{% block content %}

<section class="addexp-section">
    <div class="addexp-container">

        <div class="addexp-header">
            <h1 class="addexp-title">Edit expense</h1>
            <p class="addexp-subtitle">Update what you spent and where</p>
        </div>

        <div class="addexp-card">
            {% if error %}
            <div class="auth-error">{{ error }}</div>
            {% endif %}

            <form method="POST" action="{{ url_for('edit_expense', id=expense_id) }}">
                <div class="form-group">
                    <label for="amount">Amount (₹)</label>
                    <input type="number" id="amount" name="amount"
                           class="form-input" step="0.01" min="0.01"
                           placeholder="0.00"
                           value="{{ amount or '' }}"
                           required autofocus>
                </div>

                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="category" class="form-input" required>
                        <option value="" disabled {% if not category %}selected{% endif %}>
                            Choose a category
                        </option>
                        {% for c in categories %}
                        <option value="{{ c }}" {% if c == category %}selected{% endif %}>{{ c }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" name="date"
                           class="form-input" value="{{ date }}" required>
                </div>

                <div class="form-group">
                    <label for="description">Description <span class="optional">(optional)</span></label>
                    <textarea id="description" name="description"
                              class="form-input" rows="3"
                              placeholder="What was this for?">{{ description or '' }}</textarea>
                </div>

                <button type="submit" class="btn-submit">Update expense</button>
            </form>
        </div>

        <p class="auth-switch">
            <a href="{{ url_for('profile') }}">Back to profile</a>
        </p>

    </div>
</section>

{% endblock %}
